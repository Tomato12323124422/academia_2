<!DOCTYPE html>
<html>
<head>
    <title>QR Attendance Scanner - ACADEMIA LMS</title>
    <link rel="stylesheet" href="CSS/dashboard.css">
    <style>
        .scanner-container {
            max-width: 600px;
            margin: 50px auto;
            text-align: center;
            padding: 30px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        
        .scanner-container h2 {
            color: #2c3e50;
            margin-bottom: 20px;
        }
        
        #reader {
            width: 100%;
            max-width: 500px;
            margin: 20px auto;
            border: 3px dashed #3498db;
            border-radius: 12px;
            padding: 20px;
            background: #f8f9fa;
        }
        
        .scan-result {
            margin-top: 20px;
            padding: 20px;
            border-radius: 8px;
            font-weight: bold;
        }
        
        .scan-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .scan-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .scan-info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
        
        .back-btn {
            margin-top: 20px;
            padding: 12px 30px;
            background: #6c757d;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }
        
        .back-btn:hover {
            background: #5a6268;
        }
        
        .instructions {
            background: #e7f3ff;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: left;
        }
        
        .instructions h4 {
            margin-top: 0;
            color: #2c3e50;
        }
        
        .instructions ol {
            margin: 10px 0;
            padding-left: 20px;
        }
        
        .instructions li {
            margin: 8px 0;
            color: #555;
        }
        
        #loading {
            display: none;
            margin: 20px 0;
        }
        
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

<div class="scanner-container">
    <h2>📱 QR Attendance Scanner</h2>
    
    <div class="instructions">
        <h4>How to mark your attendance:</h4>
        <ol>
            <li>Point your camera at the teacher's QR code</li>
            <li>Hold steady until the code is detected</li>
            <li>Wait for confirmation</li>
            <li>Your attendance will be marked automatically</li>
        </ol>
    </div>
    
    <div id="reader"></div>
    
    <div id="loading">
        <div class="spinner"></div>
        <p>Marking attendance...</p>
    </div>
    
    <div id="scanResult"></div>
    
    <button class="back-btn" onclick="goBack()">← Back to Dashboard</button>
</div>

<!-- QR Code Scanner Library -->
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<script src="js/attendance.js"></script>

</body>
</html>
