<!DOCTYPE html>
<html>
<head>
    <title>Browse Courses - MASENO UNIVERSITY LMS</title>
<link rel="stylesheet" href="CSS/modern-theme.css">
    <script src="js/responsive-nav.js"></script>
</head>
<body>

<div class="dashboard">

    <!-- ===== SIDEBAR ===== -->
    <aside class="sidebar">
        <div class="logo-box">
            <img src="assets/logo.png" class="logo">
            <h3>ACADEMIA LMS</h3>
        </div>
        <ul id="menu">
            <li onclick="window.location.href='dashboard.html'">Dashboard</li>
            <li onclick="window.location.href='my-courses.html'">My Courses</li>
            <li onclick="window.location.href='courses-browse.html'" style="background: #e3f2fd;">Browse Courses</li>

            <li onclick="window.location.href='grades.html'">Grades</li>
        </ul>
    </aside>

    <!-- ===== MAIN AREA ===== -->
    <main class="main">

        <!-- TOP BAR -->
        <header class="topbar">
            <h2 id="welcome">Browse Courses</h2>
            <button onclick="logout()" class="logout">Logout</button>
        </header>

        <!-- COURSES CONTENT -->
        <section class="panel">
            <h3>Available Courses</h3>
            <div id="coursesList" class="courses-grid">
                <p>Loading courses...</p>
            </div>
        </section>

    </main>

</div>

<script>
    const API = "https://academia-2-xgdr.onrender.com/api";
    const user = JSON.parse(localStorage.getItem("user"));
    const token = localStorage.getItem("token");

    if(!user || user.role !== 'student'){
        window.location.href = "login.html";
    }

    document.getElementById("welcome").innerText = "Browse Courses - " + user.full_name;

    function logout(){
        localStorage.clear();
        window.location.href = "login.html";
    }

    let allCourses = [];
    let enrolledCourseIds = new Set();

    // Load all courses and user's enrollments
    async function loadCourses() {
        try {
            // Load all available courses
            const coursesRes = await fetch(`${API}/courses`);
            const coursesData = await coursesRes.json();
            allCourses = coursesData.courses || [];

            // Load enrolled courses
            const enrolledRes = await fetch(`${API}/courses/enrolled`, {
                headers: { "Authorization": `Bearer ${token}` }
            });
            const enrolledData = await enrolledRes.json();
            
            if (enrolledData.courses) {
                enrolledData.courses.forEach(c => enrolledCourseIds.add(c.id));
            }

            renderCourses();

        } catch (err) {
            console.error("Error loading courses:", err);
            document.getElementById("coursesList").innerHTML = "<p>Error loading courses. Please try again.</p>";
        }
    }

    function renderCourses() {
        const coursesList = document.getElementById("coursesList");

        if (allCourses.length === 0) {
            coursesList.innerHTML = "<p>No courses available yet.</p>";
            return;
        }

        coursesList.innerHTML = allCourses.map(course => {
            const isEnrolled = enrolledCourseIds.has(course.id);
            return `
                <div class="course-card">
                    <h3>${course.title}</h3>
                    <p>${course.description}</p>
                    <span class="category-tag">${course.category}</span>
                    <span class="duration-tag">${course.duration || 'Not specified'}</span>
                    <br>
                    ${isEnrolled 
                        ? '<span class="enrolled-badge">✓ Enrolled</span>' 
                        : `<button class="btn-enroll" onclick="enrollCourse('${course.id}')">Enroll Now</button>`
                    }
                </div>
            `;
        }).join('');
    }

    async function enrollCourse(courseId) {
        if (!confirm("Do you want to enroll in this course?")) return;

        try {
            const res = await fetch(`${API}/courses/${courseId}/enroll`, {
                method: "POST",
                headers: { 
                    "Content-Type": "application/json",
                    "Authorization": `Bearer ${token}`
                }
            });

            const data = await res.json();

            if (res.ok) {
                alert("Successfully enrolled!");
                enrolledCourseIds.add(courseId);
                renderCourses();
            } else {
                alert(data.message || "Failed to enroll");
            }

        } catch (err) {
            console.error("Error enrolling:", err);
            alert("Network error - could not enroll");
        }
    }

    // Load courses on page load
    loadCourses();
</script>

</body>
</html>
