<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#667eea">
    <link rel="manifest" href="manifest.json">
    <title>Academia LMS - Learning Management System</title>
    <link rel="stylesheet" href="CSS/style.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .landing-container {
            text-align: center;
            padding: 40px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 600px;
        }
        
        .logo {
            width: 120px;
            height: 120px;
            margin-bottom: 20px;
        }
        
        h1 {
            color: #333;
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        
        .tagline {
            color: #666;
            font-size: 1.2rem;
            margin-bottom: 40px;
        }
        
        .features {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 40px;
            text-align: left;
        }
        
        .feature {
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
        }
        
        .feature h3 {
            color: #667eea;
            margin-bottom: 10px;
        }
        
        .feature p {
            color: #666;
            font-size: 0.9rem;
        }
        
        .buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
        }
        
        .btn {
            padding: 15px 40px;
            border-radius: 30px;
            font-size: 1.1rem;
            text-decoration: none;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }
        
        .btn-secondary {
            background: white;
            color: #667eea;
            border: 2px solid #667eea;
        }
        
        .btn-secondary:hover {
            background: #f8f9fa;
        }
    </style>
</head>
<body>

<div class="landing-container">
    <img src="assets/logo.png" alt="Academia LMS Logo" class="logo">
    
    <h1>ACADEMIA LMS</h1>
    <p class="tagline">Your Complete Learning Management System</p>
    
    <div class="features">
        <div class="feature">
            <h3>📚 Course Management</h3>
            <p>Create and manage courses with ease</p>
        </div>
        <div class="feature">
            <h3>📱 QR Attendance</h3>
            <p>Smart attendance tracking with QR codes</p>
        </div>
        <div class="feature">
            <h3>🏆 Gamification</h3>
            <p>Earn XP points and badges for progress</p>
        </div>
        <div class="feature">
            <h3>📹 Live Classes</h3>
            <p>Join virtual classes in real-time</p>
        </div>
    </div>
    
    <div class="buttons">
        <a href="login.html" class="btn btn-primary">Login</a>
        <a href="register.html" class="btn btn-secondary">Register</a>
    </div>
</div>

</body>
</html>
