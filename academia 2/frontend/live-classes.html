<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Classes - Academia LMS</title>
    <link rel="stylesheet" href="CSS/dashboard.css">
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body>
    <div class="dashboard">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo-box">
                <img src="assets/logo.png" class="logo" alt="Logo">
                <h3>ACADEMIA LMS</h3>
            </div>
            <ul>
                <li onclick="window.location.href='dashboard.html'">📊 Dashboard</li>
                <li onclick="window.location.href='my-courses.html'">📚 My Courses</li>
                <li onclick="window.location.href='courses-browse.html'">🔍 Browse Courses</li>
                <li onclick="showAttendance()">📋 Attendance</li>
                <li onclick="showLiveClasses()">📹 Live Classes</li>
                <li onclick="window.location.href='leaderboard.html'">🏆 Leaderboard</li>
                <li onclick="logout()">🚪 Logout</li>
            </ul>
        </aside>

        <!-- Main Content -->
        <main class="main">
            <header class="topbar">
                <h2 id="welcome">Live Classes</h2>
                <button onclick="logout()" class="logout">Logout</button>
            </header>

            <!-- Upcoming Classes -->
            <section class="panel">
                <h3>📅 Upcoming Live Classes</h3>
                <div id="upcomingClasses">
                    <p>Loading classes...</p>
                </div>
            </section>

            <!-- Current Live Classes -->
            <section class="panel">
                <h3>🔴 Currently Live</h3>
                <div id="liveClasses">
                    <p>No live classes right now</p>
                </div>
            </section>
        </main>
    </div>

    <script>
        const API_BASE = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' 
            ? 'http://localhost:5000' 
            : 'https://academia-2-xgdr.onrender.com';
        const API = `${API_BASE}/api`;

        const user = JSON.parse(localStorage.getItem("user"));
        const token = localStorage.getItem("token");

        if (!user || !token) {
            window.location.href = "login.html";
        }

        document.getElementById("welcome").innerText = `Live Classes - Welcome, ${user.full_name}`;

        loadLiveClasses();

        async function loadLiveClasses() {
            try {
                // Get enrolled courses first
                const enrolledRes = await fetch(`${API}/courses/enrolled`, {
                    headers: { "Authorization": `Bearer ${token}` }
                });
                const enrolledData = await enrolledRes.json();
                const courseIds = enrolledData.courses?.map(c => c.id) || [];

                // Get all upcoming classes for enrolled courses
                const upcomingRes = await fetch(`${API}/live-class/upcoming`, {
                    headers: { "Authorization": `Bearer ${token}` }
                });
                const upcomingData = await upcomingRes.json();

                // Get currently live classes (within last hour)
                const now = new Date();
                const oneHourAgo = new Date(now.getTime() - 60*60*1000).toISOString();
                const liveRes = await fetch(`${API}/live-class/upcoming`, {
                    headers: { "Authorization": `Bearer ${token}` }
                });
                const liveData = await liveRes.json();
                const currentLive = liveData.liveClasses?.filter(cls => {
                    const scheduled = new Date(cls.scheduled_at);
                    return scheduled <= now && scheduled >= new Date(now.getTime() - 30*60*1000); // Within 30 min
                }) || [];

                updateUpcomingClasses(upcomingData.liveClasses || []);
                updateLiveClasses(currentLive);

            } catch (error) {
                console.error("Error loading live classes:", error);
                document.getElementById("upcomingClasses").innerHTML = "<p>Error loading classes. Please refresh.</p>";
            }
        }

        function updateUpcomingClasses(classes) {
            const container = document.getElementById("upcomingClasses");
            if (classes.length === 0) {
                container.innerHTML = "<p>No upcoming live classes for your enrolled courses.</p>";
                return;
            }

            container.innerHTML = classes.map(cls => {
                const scheduled = new Date(cls.scheduled_at).toLocaleString();
                const now = new Date();
                const diff = new Date(cls.scheduled_at) - now;
                const timeLeft = diff > 0 ? Math.ceil(diff / (1000 * 60)) + ' min' : 'Started!';
                
                return `
                    <div class="live-class-item">
                        <div class="live-class-info">
                            <h4>${cls.course.title} - ${cls.title}</h4>
                            <p>📅 ${scheduled}</p>
                            <p>⏰ ${timeLeft}</p>
                        </div>
                        <a href="${cls.zoom_link}" target="_blank" class="join-btn" style="${diff < 0 ? '' : 'opacity: 0.5; pointer-events: none;'}">
                            ${diff < 0 ? 'Join Now' : 'Starts Soon'}
                        </a>
                    </div>
                `;
            }).join('');
        }

        function updateLiveClasses(classes) {
            const container = document.getElementById("liveClasses");
            if (classes.length === 0) {
                container.innerHTML = "<p>No live classes right now</p>";
                return;
            }

            container.innerHTML = classes.map(cls => {
                return `
                    <div class="live-class-item live-now">
                        <div class="live-class-info">
                            <h4>${cls.course.title} - ${cls.title}</h4>
                            <p>🔴 LIVE NOW</p>
                        </div>
                        <a href="${cls.zoom_link}" target="_blank" class="join-btn">
                            Join Class
                        </a>
                    </div>
                `;
            }).join('');
        }

        function showAttendance() {
            window.location.href = "attendance-scan.html";
        }

        function logout() {
            localStorage.clear();
            window.location.href = "login.html";
        }

        // Auto-refresh every 2 minutes
        setInterval(loadLiveClasses, 120000);
    </script>
</body>
</html>
