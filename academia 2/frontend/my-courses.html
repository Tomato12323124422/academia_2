<!DOCTYPE html>
<html>
<head>
    <title>My Courses - ACADEMIA LMS</title>
<link rel="stylesheet" href="CSS/modern-theme.css">
    <script src="js/responsive-nav.js"></script>
</head>
<body>

<div class="dashboard">

    <!-- ===== SIDEBAR ===== -->
    <aside class="sidebar">
        <div class="logo-box">
            <img src="assets/logo.png" class="logo">
            <h3>ACADEMIA LMS</h3>
        </div>
        <ul id="menu">
            <li onclick="window.location.href='dashboard.html'">Dashboard</li>
            <li onclick="window.location.href='my-courses.html'" style="background: #e3f2fd;">My Courses</li>
            <li onclick="window.location.href='courses-browse.html'">Browse Courses</li>

            <li onclick="window.location.href='quizzes.html'">Quizzes</li>
            <li onclick="window.location.href='grades.html'">Grades</li>
        </ul>
    </aside>

    <!-- ===== MAIN AREA ===== -->
    <main class="main">

        <!-- TOP BAR -->
        <header class="topbar">
            <h2 id="welcome">My Courses</h2>
            <button onclick="logout()" class="logout">Logout</button>
        </header>

        <!-- COURSES CONTENT -->
        <section class="panel">
            <h3>Enrolled Courses</h3>
            <div id="coursesList" class="courses-grid">
                <p>Loading courses...</p>
            </div>
        </section>

    </main>

</div>

<script>
    const API = "https://academia-2-xgdr.onrender.com/api";
    const user = JSON.parse(localStorage.getItem("user"));
    const token = localStorage.getItem("token");

    if(!user || user.role !== 'student'){
        window.location.href = "login.html";
    }

    document.getElementById("welcome").innerText = "My Courses - " + user.full_name;

    function logout(){
        localStorage.clear();
        window.location.href = "login.html";
    }

    // Load enrolled courses
    async function loadEnrolledCourses() {
        try {
            const res = await fetch(`${API}/courses/enrolled`, {
                headers: { 
                    "Authorization": `Bearer ${token}`
                }
            });

            const data = await res.json();
            const coursesList = document.getElementById("coursesList");

            if (res.ok && data.courses && data.courses.length > 0) {
                coursesList.innerHTML = data.courses.map(course => `
                    <div class="course-card">
                        <h3>${course.title}</h3>
                        <p>${course.description}</p>
                        <span class="category-tag">${course.category}</span>
                        <span class="duration-tag">${course.duration || 'Not specified'}</span>
                        <span class="enrolled-date">Enrolled: ${new Date(course.enrolled_at).toLocaleDateString()}</span>
                        <button class="btn-view" onclick="viewCourse('${course.id}')">View Course</button>
                    </div>
                `).join('');
            } else {
                coursesList.innerHTML = `
                    <div class="empty-state" style="grid-column: 1 / -1;">
                        <h3>No courses yet</h3>
                        <p>You haven't enrolled in any courses. Browse our catalog to find courses!</p>
                        <button class="btn-view" onclick="window.location.href='courses-browse.html'">Browse Courses</button>
                    </div>
                `;
            }

        } catch (err) {
            console.error("Error loading courses:", err);
            document.getElementById("coursesList").innerHTML = "<p>Error loading courses. Please try again.</p>";
        }
    }

    function viewCourse(courseId) {
        // For now, redirect to assignments page filtered by course
        window.location.href = `assignments.html?course=${courseId}`;
    }

    // Load courses on page load
    loadEnrolledCourses();
</script>

</body>
</html>
