services:
  - type: web
    name: academia-lms
    runtime: node
    buildCommand: cd "academia 2" && npm install
    startCommand: cd "academia 2" && npm start


    envVars:
      - key: NODE_ENV
        value: production
# PORT auto $PORT
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
