services:
  - type: web
    name: academia-lms
    runtime: node
    buildCommand: npm install
    startCommand: npm start


    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
